# Runtime config file for remote_process_control
# Format: KEY=VALUE

# Capture backend: auto | dxgi | gdi
RPC_CAPTURE_BACKEND=auto

# Capture behavior
RPC_CAPTURE_ALL_WINDOWS=0
RPC_ALLOW_CAPTURE_PID_REBIND=1
RPC_ACTIVE_FPS=30
RPC_IDLE_FPS=5

# Encoder backend: auto | sw | nvenc | qsv | amf
RPC_ENCODER_BACKEND=auto

# BMP dump options
RPC_DUMP_BMP=0
RPC_DUMP_BMP_STAGE=capture
RPC_DUMP_BMP_EVERY_N=1
RPC_DUMP_BMP_LOG=0
RPC_DUMP_BMP_LOG_EVERY_N=30
RPC_DUMP_BMP_MAX_FRAMES=0

