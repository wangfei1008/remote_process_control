# Runtime config file for remote_process_control
# Format: KEY=VALUE

# Signaling
RPC_SIGNALING_IP=127.0.0.1
RPC_SIGNALING_PORT=9090
RPC_SIGNALING_LOCAL_ID=server

# WebRTC
RPC_WEBRTC_STUN_SERVER=stun.l.google.com:19302

# Capture backend: dxgi | gdi
# 规则：默认 dxgi；若系统不支持 dxgi，则退回 gdi
RPC_CAPTURE_BACKEND=dxgi

# Capture behavior
RPC_CAPTURE_ALL_WINDOWS=0
RPC_ALLOW_CAPTURE_PID_REBIND=1
# Some apps (e.g. Photoshop) spawn child processes and show UI late.
# Keep this long enough to allow PID rebind before first successful frame.
RPC_PID_REBIND_STARTUP_WINDOW_MS=120000
RPC_WINDOW_MISSING_EXIT_GRACE_MS=5000
RPC_CAPTURE_DEGRADE_MS=2500
# 慢采集丢帧阈值（ms）。<=0 关闭丢帧，优先保证视频连续更新；建议先保持 0。
RPC_SLOW_CAPTURE_DISCARD_MS=0
# 首帧前连续空帧达到阈值后，强制丢弃当前窗口并重新选择（避免卡在错误 HWND）。
RPC_PRE_VIDEO_RESELECT_EMPTY_THRESHOLD=30
RPC_ACTIVE_FPS=30
RPC_IDLE_FPS=5
# 进入 idle_fps 前需要连续“稳定输入帧”的次数（越大越平滑，越小越省带宽/更快降码率）
RPC_IDLE_ENTER_STABLE_FRAMES=24
# 判断输入活跃的最近时间窗口（毫秒）
RPC_RECENT_INPUT_WINDOW_MS=300

# Encoder backend: auto | sw | nvenc | qsv | amf
RPC_ENCODER_BACKEND=auto

# File transfer
# Fixed data root for "我的数据" (must be on a local fixed disk path)
RPC_DATA_ROOT=D:\rpc_data
# Recommended chunk size in bytes for upload/download resume (small chunks are safer on DataChannel)
RPC_FILE_CHUNK_SIZE=4096

# Telemetry
RPC_FRAME_MARK_INTERVAL=10
RPC_CAPTURE_HEALTH_INTERVAL=30

# BMP dump options
RPC_DUMP_BMP=0
RPC_DUMP_BMP_STAGE=capture
RPC_DUMP_BMP_EVERY_N=1
RPC_DUMP_BMP_LOG=0
RPC_DUMP_BMP_LOG_EVERY_N=30
RPC_DUMP_BMP_MAX_FRAMES=0

