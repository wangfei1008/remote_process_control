<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>工业软件远程工作站</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth_portal.css">
    <link rel="stylesheet" href="admin_console.css">
    <!-- adapter.js 外链在部分网络环境会失败（ERR_EMPTY_RESPONSE），先禁用以避免影响主流程 -->
</head>
<body>
    <!-- Electron 无边框时左侧窄条可拖动窗口（出画后显示） -->
    <div id="electron-drag-edge" class="electron-drag-edge" aria-hidden="true"></div>
    <!-- 经典单页 UI 已移除：入口页仅承载桌面容器 / rpcWindow 视频舞台等必要节点 -->

    <!-- 应用模式（?rpcWindow=1）：先显示等待文案，出画后由 JS 隐藏 -->
    <div id="rpc-window-wait" class="rpc-window-wait" hidden>
        <p class="rpc-window-wait-title">正在连接远程应用…</p>
        <p class="rpc-window-wait-hint">请确认信令服务已启动；用 <code>http(s)</code> 打开页面时会再读取 <code>signaling_config.json</code> 覆盖 <code>signaling_config.js</code>；<code>file://</code> 仅支持编辑 <code>signaling_config.js</code>。也可用 <code>?signaling=</code> 覆盖。无视频流或信令断开时窗口将自动关闭；可按 <kbd>Esc</kbd> 退出（Electron）。</p>
    </div>

    <!-- 与 RTCPeerConnection 同文档；画面按远端窗口分辨率居中显示（四周黑边），双击黑边可浏览器全屏 -->
    <div id="video-stage" class="video-stage" hidden>
        <video id="rpc-main-video" muted playsinline autoplay tabindex="0"></video>
        <div class="video-stage-hud" id="video-stage-hud">
            <span id="rpc-video-size">0 x 0</span>
            <span id="rpc-cursor-pos">0, 0</span>
            <span id="rpc-latency-hud" class="rpc-latency-hud" title="端到端与 WebRTC 统计（详见控制台 [latency] 日志）">延时: —</span>
            <span class="video-stage-hint">点击画面后可键盘控制；双击黑边全屏</span>
            <button type="button" id="video-stage-close" class="video-stage-btn">退出画面</button>
        </div>
    </div>

    <!-- 信令配置：signaling_config.js 须先于 rpc_config.js（file:// 禁止读 JSON） -->
    <script src="./signaling_config.js"></script>
    <script src="./rpc_config.js"></script>
    <script src="./receiver_probe.js"></script>
    <script src="./rpc_random_id.js"></script>
    <script src="./rpc_md5.js"></script>
    <script src="./auth_signaling.js"></script>
    <script src="./auth_portal.js"></script>
    <!-- 桌面：启动进程管理（须先于 desktopMode） -->
    <script src="./desktop_process_manager.js" defer></script>
    <script src="./admin_console.js" defer></script>
    <!-- Desktop Container：使用普通 script，支持 file:// -->
    <script src="./desktopMode.js" defer></script>
    <!-- UI / WebRTC / 信令（须在 client 之前加载完毕，由 DOMContentLoaded 后启动） -->
    <script src="./uiLayer.js" defer></script>
    <script src="./webrtcLayer.js" defer></script>
    <script src="./signalingLayer.js" defer></script>
    <!-- client.js：依赖 ui/webrtc/signaling 已挂载到 window -->
    <script src="./client.js" defer></script>
</body>
</html>
